<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>WebMoonsbox</title><meta name="viewport" content="width=device-width,initial-scale=1"><style>html{background-color:#f5f5f5}body{background-color:#fff;max-width:1000px;margin:auto;padding:1rem}#game-surface{margin:1rem auto;width:100%;image-rendering:pixelated;background-color:#000;display:block;touch-action:pinch-zoom}.reset-form{display:grid;grid-template-columns:max-content 10rem;gap:.2rem .5rem;margin:1rem 0}.reset-form-wide-btn{grid-column:span 2}.saving-form{display:grid;grid-template-columns:minmax(0,20rem) max-content;gap:.2rem;margin:1rem 0}</style><link rel="stylesheet" href="materialpalettestyle.css"><link rel="icon" href="assets/window_icon" type="image/png"></head><body><h1>WebMoonsbox</h1><canvas id="game-surface">Your browser doesn't support &lt;canvas&gt; tag. Please update.</canvas><div id="all-controls-div"><div><label for="brush-size-slider">Brush Size:</label> 1 <input type="range" min="1" max="50" step="1" value="1" id="brush-size-slider" oninput="brush.thickness=this.value"> 50</div><div><button onclick="pauseGame()" id="pause-btn">Pause</button></div><div><label for="switch-vision-mode-btn">Vision Mode: <span id="current-vision-mode-span">Loading...</span></label> <button onclick="switchVisionMode()" id="switch-vision-mode-btn">Switch</button></div><form class="reset-form"><label for="reset-form-width">Width</label> <input type="number" id="reset-form-width" min="10" max="1000" step="1"> <label for="reset-form-height">Height</label> <input type="number" id="reset-form-height" min="10" max="1000" step="1"> <button type="button" class="reset-form-wide-btn" onclick="resetMap()">Reset Map</button></form><form id="saving-form" class="saving-form"><input type="file" accept=".kk-save, application/x-moonsbox-save" id="saving-file-input" onchange="onSavingFileInputChange(event,this)"> <button type="button" onclick="loadGame()">Load Game</button> <a id="saving-download-link"></a> <button type="button" onclick="saveGame()">Save Game</button></form></div><div><h2>Material Palette</h2><div id="material-palette-grid" class="material-palette-grid"></div></div><script src="soundsystem.js"></script><script src="renderer.js"></script><script src="brush.js"></script><script src="materialpalette.js"></script><script src="main.js"></script><script src="webmoonsbox.js"></script></body></html>
