<!DOCTYPE html>
<html lang="en">
    

<head>
    <meta charset="UTF-8">
    <title>WebMoonsbox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html {
            background-color: whitesmoke;
        }

        body {
            background-color: white;
            max-width: 1000px;
            margin: auto;
            padding: 1em;
        }

        #game-surface {
            margin: auto;
            width: 100%; /* will be reused in JS */
            image-rendering: pixelated;
            background-color: black;
            display: block;
            touch-action: pinch-zoom;
        }

        .reset-form {
            display: grid;
            grid-template-columns: max-content 10rem;
            gap: 0.2rem 0.5rem;
            margin: 0.5rem 0;
        }

        .reset-form-btn {
            grid-column: span 2;
        }
    </style>
    <link rel="stylesheet" href="materialpalettestyle.css">
</head>


<body>
    <h1>WebMoonsbox</h1>
    <canvas id="game-surface">
        Your browser doesn't support &lt;canvas&gt; tag. Please update.
    </canvas>

    <div>
        <p>Brush Size</p>
        1
        <input type="range" min="1" max="50" step="1" value="1"
               id="brush-size-slider"
               oninput="brush.thickness = this.value">
        50
    </div>

    <button onclick="pauseGame()" id="pause-btn">
        Pause
    </button>

    <button onclick="soundSystem.audioCtx.resume(); this.remove()">
        Try to click me if sounds don't work
    </button>

    <form class="reset-form">
        <label for="reset-form-width">Width</label>
        <input type="number" id="reset-form-width" min="10" max="1000" step="1">

        <label for="reset-form-height">Height</label>
        <input type="number" id="reset-form-height" min="10" max="1000" step="1">

        <button type="button" class="reset-form-btn" onclick="resetMap()">Reset Map</button>
    </form>

    <div>
        <h2>Material Palette</h2>
        <div id="material-palette-grid" class="material-palette-grid"></div>
    </div>

    <script src="soundsystem.js"></script>
    <script src="renderer.js"></script>
    <script src="brush.js"></script>
    <script src="materialpalette.js"></script>
    <script>
        "use strict";

        var defaultSize = {x: 240, y: 135};
        document.getElementById('brush-size-slider').value = 1;
        document.getElementById('reset-form-width').value  = defaultSize.x;
        document.getElementById('reset-form-height').value = defaultSize.y;

        var soundSystem = new SoundSystem();
        soundSystem.loadSounds();

        var canvas = document.getElementById('game-surface');
        canvas.style.height = Math.min(canvas.clientHeight, window.innerHeight * 0.5) + 'px';
        canvas.style.width = 'auto';

        var brush = new Brush(canvas);
        brush.setOnActivationCB(() => soundSystem.audioCtx.resume());

        var framesCount = 0;
        var buffers;
        var pixels;
        var brush;
        var gl;
        var rendererGL;
        var isInited = false;

        function initGame(size) {
            canvas.width = size.x;
            canvas.height = size.y;
            canvas.style.aspectRatio = `${size.x} / ${size.y}`;

            gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if(gl == null) {
                console.error('Cannot get WebGL context.');
            }
            gl.viewport(0, 0, size.x, size.y);
            rendererGL = new RendererGL(gl, size.x, size.y);

            buffers = JSON.parse(Module.UTF8ToString(Module._init_game(size.x, size.y)));
            pixels = new Uint8Array(wasmMemory.buffer, buffers.colors_ptr, size.x * size.y * 4);

            initMaterialPalette(brush);
            isInited = true;
        }

        function tickRender() {
            if(isInited) {
                Module._tick(true, false, false);
                rendererGL.render(gl, pixels);
                brush.updateDrawing();
            }
            ++framesCount;
            requestAnimationFrame(tickRender);
        }
        tickRender();

        var Module = {
            onRuntimeInitialized: function() {
                initGame(defaultSize);
            },
        };

        const pauseBtn = document.getElementById('pause-btn');

        function pauseGame() {
            const v = Module._tick(false, false, false);
            Module._tick(false, true, !v);

            pauseBtn.textContent = v ? 'Pause' : 'Unpause';
        }

        const resetFormWidth = document.getElementById('reset-form-width');
        const resetFormHeight = document.getElementById('reset-form-height');

        function resetMap() {
            const size = {
                x: parseInt(resetFormWidth.value),
                y: parseInt(resetFormHeight.value),
            };
            if(size.x == null || size.y == null) {
                window.alert('adsa');
                return;

            }
            initGame(size);
        }
    </script>
    <script src="../build-wasm/webmoonsbox/webmoonsbox.js"></script>
</body>


</html>
