<!DOCTYPE html>
<html lang="en">
    

<head>
    <meta charset="UTF-8">
    <title>WebMoonsbox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        #game-surface {
            width: 500px;
            height: 500px;
            image-rendering: pixelated;
            background-color: black;
        }
    </style>
</head>


<body>
    <h1>WebMoonsbox</h1>
    <canvas id="game-surface" width="100" height="100"></canvas>

    <button name="enable-sounds" onclick="enableSounds()" id="enable-sounds-btn">
        Enable Sounds
    </button> <br>

    <script src="soundsystem.js"></script>
    <script>
        async function enableSounds() {
            var soundSystem = new SoundSystem();
            await soundSystem.loadSounds();
            playSoundCBID = Module.addFunction(soundSystem.playSoundCB.bind(soundSystem), 'vppi');
            Module._register_play_sound_callback(playSoundCBID);
            document.getElementById('enable-sounds-btn').remove();
        }
    </script>

    <script src="renderer.js"></script>
    <script>
        "use strict";

        var buffers = {};
        var framesCount = 0;
        var playSoundCBID = 0;

        var Module = {
            onRuntimeInitialized: function() {
                buffers = JSON.parse(Module.UTF8ToString(Module._init_game(100, 100)));
                const pixels = new Uint8Array(wasmMemory.buffer, buffers.colors_ptr, 100*100*4);

                const canvas = document.getElementById('game-surface');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                const rendererGL = new RendererGL(gl, 100, 100);
                
                function render() {
                    Module.ccall('draw_dot', 'boolean', ['number', 'number', 'string'], [50, 50, 'Sand']);
                    Module.ccall('play_place_sound', 'boolean', ['number', 'number', 'string'], [50, 50, 'Sand']);
                    Module._tick(false, false);

                    rendererGL.render(gl, pixels);

                    ++framesCount;
                    requestAnimationFrame(render);
                }
                
                render();
            }
        };
    </script>
    <script src="../build-wasm/webmoonsbox/webmoonsbox.js"></script>
</body>


</html>
