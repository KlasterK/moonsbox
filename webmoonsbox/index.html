<!DOCTYPE html>
<html lang="en">
    

<head>
    <meta charset="UTF-8">
    <title>WebMoonsbox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html {
            background-color: whitesmoke;
        }

        body {
            background-color: white;
            max-width: 1000px;
            margin: auto;
            padding: 1em;
        }

        #game-surface {
            margin: auto;
            width: 100%; /* will be reused in JS */
            image-rendering: pixelated;
            background-color: black;
            display: block;
            touch-action: pinch-zoom;
        }
    </style>
    <link rel="stylesheet" href="materialpalettestyle.css">
</head>


<body>
    <h1>WebMoonsbox</h1>
    <canvas id="game-surface">
        Your browser doesn't support &lt;canvas&gt; tag. Please update.
    </canvas>

    <div>
        <p>Brush Size</p>
        1
        <input type="range" min="1" max="50" step="1" value="1"
               id="brush-size-slider"
               oninput="brush.thickness = this.value">
        50
    </div>

    <button onclick="pauseGame()" id="pause-btn">
        Pause
    </button>

    <button onclick="soundSystem.audioCtx.resume(); this.remove()">
        Try to click me if sounds don't work
    </button>

    <div>
        <h2>Material Palette</h2>
        <div id="material-palette-grid" class="material-palette-grid"></div>
    </div>

    <script src="soundsystem.js"></script>
    <script src="renderer.js"></script>
    <script src="brush.js"></script>
    <script src="materialpalette.js"></script>
    <script>
        "use strict";

        document.getElementById('brush-size-slider').value = 1;

        var size = {x: 240, y: 135};

        var soundSystem = new SoundSystem();
        soundSystem.loadSounds();

        var canvas = document.getElementById('game-surface');
        canvas.width = size.x;
        canvas.height = size.y;
        canvas.style.aspectRatio = `${size.x} / ${size.y}`;
        canvas.style.height = Math.min(canvas.clientHeight, window.innerHeight * 0.5) + 'px';
        canvas.style.width = 'auto';

        var brush = new Brush(canvas);
        brush.setOnActivationCB(() => soundSystem.audioCtx.resume());

        var buffers;
        var framesCount = 0;

        var Module = {
            onRuntimeInitialized: function() {
                buffers = JSON.parse(Module.UTF8ToString(Module._init_game(size.x, size.y)));
                const pixels = new Uint8Array(wasmMemory.buffer, buffers.colors_ptr, size.x * size.y * 4);

                initMaterialPalette(brush);

                let playSoundCBID = Module.addFunction(soundSystem.playSoundCB.bind(soundSystem), 'vppi');
                Module._register_play_sound_callback(playSoundCBID);

                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                const rendererGL = new RendererGL(gl, size.x, size.y);
                
                function render() {
                    Module._tick(true, false, false);

                    rendererGL.render(gl, pixels);

                    ++framesCount;
                    brush.updateDrawing();
                    requestAnimationFrame(render);
                }
                
                render();
            }
        };

        const pauseBtn = document.getElementById('pause-btn');

        function pauseGame() {
            const v = Module._tick(false, false, false);
            Module._tick(false, true, !v);

            pauseBtn.textContent = v ? 'Pause' : 'Unpause';
        }
    </script>
    <script src="../build-wasm/webmoonsbox/webmoonsbox.js"></script>
</body>


</html>
